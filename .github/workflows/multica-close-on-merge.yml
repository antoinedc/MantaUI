name: Multica Close on Merge

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    name: Close or comment on BET issue
    runs-on: [self-hosted, linux]
    timeout-minutes: 5
    steps:
      - name: Extract BET issue key
        id: extract
        shell: bash
        run: |
          KEY=""
          # Try PR title first
          if [[ "${{ github.event.pull_request.title }}" =~ BET-([0-9]+) ]]; then
            KEY="BET-${BASH_REMATCH[1]}"
          # Then branch name
          elif [[ "${{ github.head_ref }}" =~ BET-([0-9]+) ]]; then
            KEY="BET-${BASH_REMATCH[1]}"
          fi
          if [[ -z "$KEY" ]]; then
            echo "no_issue=true" >> "$GITHUB_OUTPUT"
            echo "No BET-N issue key found in PR title or branch."
            exit 0
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Found issue: $KEY"

      - name: Set issue to done (merged)
        if: steps.extract.outputs.no_issue != 'true' && github.event.pull_request.merged == true
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://multica.useronda.com/api/issues/${{ steps.extract.outputs.key }}" \
            -H "Authorization: Bearer ${{ secrets.MULTICA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "workspace_id": "264c89bb-4659-4570-af7b-5f8daaf87985",
              "status": "done"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "Set ${{ steps.extract.outputs.key }} to done."
          else
            echo "Warning: failed to update issue (HTTP $HTTP_CODE): $BODY"
          fi
        continue-on-error: true

      - name: Comment on PR (closed without merge)
        if: steps.extract.outputs.no_issue != 'true' && github.event.pull_request.merged != true
        uses: actions/github-script@v7
        with:
          script: |
            const key = "${{ steps.extract.outputs.key }}";
            const wsId = "264c89bb-4659-4570-af7b-5f8daaf87985";
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;
            const comment = `This PR was closed without merging. Marking **${key}** as still open — please reopen or close the issue manually if it's no longer applicable.`;

            // Post comment via Multica API if available
            try {
              const resp = await fetch("https://multica.useronda.com/api/issues/" + key + "/comments", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + process.env.MULTICA_TOKEN,
                },
                body: JSON.stringify({
                  workspace_id: wsId,
                  body: comment,
                }),
              });
              if (resp.ok) {
                console.log("Posted comment to " + key + " via Multica.");
              } else {
                console.log("Multica comment failed (HTTP " + resp.status + "), continuing.");
              }
            } catch (e) {
              console.log("Multica comment error: " + e.message + ", continuing.");
            }

            // Also post a GitHub PR comment for visibility
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment,
            });

      - name: Done
        if: always()
        run: echo "Multica close-on-merge step completed."
