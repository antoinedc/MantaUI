# Anti-spaghetti detector — ported from leasebot/tenanture. NON-BLOCKING by
# design and deliberately NOT in required-checks.json: jscpd on a diff is noisy
# (coincidental clones, the intentional desktop/mobile transport mirrors), so a
# hard gate would block nearly every PR. This computes the signal ONCE and
# posts it as a sticky PR comment; the manta-reviewer agent READS that comment
# and exercises judgment (Block / Question / Nit / nothing). CI never decides.
#
# Detector logic lives in scripts/check-duplication.sh (single source of
# computation) so the reviewer can run the identical script as a fallback when
# the comment is missing.

name: anti-spaghetti

on:
  pull_request:
    branches: [main]

concurrency:
  group: anti-spaghetti-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  duplication-report:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # to post/update the sticky report comment
    steps:
      - name: Checkout (full history for merge-base diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run duplication detector
        run: |
          # Never fail the job on detector output — signal, not a gate.
          bash scripts/check-duplication.sh "origin/${{ github.base_ref }}" \
            > /tmp/anti-spaghetti-report.md 2>&1 || true
          echo "Report written ($(wc -l < /tmp/anti-spaghetti-report.md) lines)."

      - name: Post / update sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/anti-spaghetti-report.md', 'utf8');
            const marker = '<!-- anti-spaghetti-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
