name: Anti-Spaghetti (Duplication Check)

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  detect:
    name: Duplication Detection
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    # This is a signal, never a gate — always succeed
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run duplication check
        id: check
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Get list of changed .ts/.tsx files in the PR
          CHANGED_FILES=$(git diff --name-only "$BASE" "$HEAD" -- '*.ts' '*.tsx' 2>/dev/null)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No TypeScript files changed. Skipping."
            echo "report=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run the duplication script on changed files
          OUTPUT=$(scripts/check-duplication.sh "$BASE" "$HEAD" 2>&1) || true
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "DUPLICATES FOUND\|duplicate\|Duplication detected"; then
            echo "has_duplicates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_duplicates=false" >> "$GITHUB_OUTPUT"
          fi
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.check.outputs.has_duplicates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.check.outputs.report }}`;
            const prNumber = context.payload.pull_request.number;
            const marker = "<!-- anti-spaghetti-report -->";

            // Check if we already posted a comment
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = existing.find(c => c.body && c.body.includes(marker));

            const body = [
              marker,
              "## 🍝 Duplication Detected",
              "",
              "The duplication checker found potential code duplication in this PR.",
              "This is a **signal**, not a failure — review the findings and refactor if needed.",
              "",
              "```",
              report,
              "```",
              "",
              "> Run `scripts/check-duplication.sh` locally for full details.",
            ].join("\n");

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
              console.log("Updated existing anti-spaghetti comment.");
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
              console.log("Posted new anti-spaghetti comment.");
            }
