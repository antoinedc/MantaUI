name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}-${{ github.event.review.id || 'none' }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    name: Typecheck & Test
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
