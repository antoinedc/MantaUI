# CI — the deterministic merge gate, ported from the leasebot/tenanture setup.
#
# Job name `typecheck-test` is a REQUIRED check (required-checks.json + branch
# protection). This makes the PM agent's GATE 2 tamper-proof: the gate runs on
# the repo's self-hosted runner (bui-dev-runner on the dev box), independent of
# whatever an implementer agent claims locally. The PM reads `gh pr checks`
# instead of checking out PR branches.
#
# Scope deliberately matches AGENTS.md's documented gate:
#   npm run typecheck && npm test   (tsc x2, vitest, node:test)
# No lint gate — the repo has no eslint config and ChatPanel-scale legacy would
# make one permanently red. Duplication/lint signal is the NON-blocking
# anti-spaghetti workflow instead.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty's electron-rebuild postinstall needs build tools; it is
      # best-effort in package.json already (`|| true`), so npm ci works on the
      # runner even if the native rebuild is skipped — tests don't spawn ptys.
      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest + node:test)
        run: npm test

  # STRICT blocking duplication gate (owner decision 2026-07-02) — required
  # check. Any jscpd clone among changed files fails; exemptions only via the
  # human-approval-class scripts/duplication-gate-ignore.txt. The advisory
  # anti-spaghetti sticky comment remains the reviewer's judgment layer.
  duplication-gate:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Strict duplication gate
        run: bash scripts/check-duplication-gate.sh "origin/${{ github.base_ref }}"

  # Restored from the pre-existing ci.yml (65bfc0f) — the BET-9 e2e smoke gate.
  # NOT in required-checks.json (Electron+Xvfb on the runner is flakier than
  # the deterministic gates); the PM treats a red e2e-smoke as a judgment call,
  # a red typecheck-test as an absolute stop.
  e2e-smoke:
    name: E2E Smoke Test
    runs-on: self-hosted
    timeout-minutes: 30
    needs: typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: bash scripts/check-e2e-smoke.sh
