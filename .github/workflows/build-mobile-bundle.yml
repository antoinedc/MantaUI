# Build + commit the mobile/web bundle on push to main.
#
# WHY THIS EXISTS
# ---------------
# The mobile/web client (`src/server/` PUBLIC_DIR) is served as a PRE-BUILT
# static bundle from `mobile/www/` — manta-server reads the files off disk per
# request, there is no build step on the box at deploy time. Historically the
# bundle was committed into EVERY feature branch (rebuilt by hand via
# `npm run build:mobile`). Vite content-hashes the asset filenames
# (`index-<hash>.js`) and rewrites the `<script src>` in `index.html`, so any
# two in-flight PRs that both rebuilt produced DIFFERENT hashed filenames plus
# conflicting edits to the same lines of index.html — git could not auto-merge
# either, forcing extra rebase cycles (flagged on BET-118).
#
# THE FIX (option 2)
# ------------------
# `mobile/www/` is now gitignored on branches (see .gitignore). Nothing
# generated lives in feature-branch diffs, so the structural conflict is gone.
# This workflow is the SINGLE place the bundle is produced and committed: on
# every push to `main` it rebuilds `mobile/www/` from source
# (src/renderer/ + src/renderer/public/) and commits it back to main, so the
# box's `git pull` on main still yields a ready-to-serve bundle — deploy stays
# "git pull + restart", no build step on the box.
#
# LOOP GUARD
# ----------
# This workflow's own commit pushes to main, which re-triggers `push: main`.
# Because `mobile/www/` is gitignored, that follow-up run rebuilds, finds the
# committed bundle already matches source, sees NO diff, and exits without
# committing — so it terminates after one extra no-op run. The `[skip ci]` tag
# in the commit message additionally short-circuits the other push-triggered
# workflows (CI, etc.) for the bundle commit.

name: Build mobile bundle

on:
  push:
    branches: [main]

# Serialize: two merges to main in quick succession must not race two pushes of
# the bundle. cancel-in-progress:false so an in-flight build+commit finishes
# before the next runs (avoids a lost update / non-fast-forward push).
concurrency:
  group: build-mobile-bundle
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a real ref (not detached HEAD) to commit + push back the
          # rebuilt bundle, and the token must be able to (a) push a new branch
          # and (b) call `gh pr create` / `gh pr merge`.
          #
          # main's repository ruleset (id 19571599) has no bypass actors and
          # requires a PR + 3 status checks, so direct pushes to main are now
          # rejected for every token — including this admin PAT. The bundle
          # lands via an auto-merged PR (a mobile/www-only PR touches no
          # CODEOWNERS path and needs 0 approvals). BUNDLE_PUSH_TOKEN is still
          # required because the default GITHUB_TOKEN cannot open a PR that the
          # ruleset then has to evaluate. fetch-depth: 0 so the branch carries
          # full history for the PR.
          ref: main
          token: ${{ secrets.BUNDLE_PUSH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty's electron-rebuild postinstall is best-effort (`|| true` in
      # package.json); the mobile build is pure Vite and doesn't need the native
      # module, so npm ci succeeds on the runner regardless.
      - run: npm ci

      - name: Build mobile bundle
        run: npm run build:mobile

      - name: Commit bundle if changed
        env:
          # This is set on the runner's git identity; the commit is authored by
          # the workflow so it's distinguishable from human/agent commits.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          # Reuse BUNDLE_PUSH_TOKEN for the gh CLI so the workflow can open +
          # auto-merge its own PR. The default GITHUB_TOKEN would be rejected
          # by the ruleset's code-owner / required-check evaluation.
          GH_TOKEN: ${{ secrets.BUNDLE_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          # mobile/www/ is gitignored, so -f is required to stage the freshly built bundle.
          git add -f mobile/www

          # No diff → source produced an identical bundle (steady state / loop-guard
          # follow-up run). Nothing to do.
          if git diff --cached --quiet; then
            echo "mobile/www/ already up to date with source — nothing to commit."
            exit 0
          fi

          BRANCH="chore/mobile-bundle-${GITHUB_SHA::12}"
          git checkout -b "$BRANCH"
          git commit -m "chore(mobile): rebuild mobile/www bundle [skip ci]"
          git push origin "$BRANCH"

          # Open the PR and merge it. A mobile/www-only PR touches no CODEOWNERS path,
          # so it needs 0 approvals — it merges as soon as required checks are green.
          PR_URL=$(gh pr create \
            --base main --head "$BRANCH" \
            --title "chore(mobile): rebuild mobile/www bundle" \
            --body "Automated PWA bundle rebuild. mobile/www/ is a build artifact of src/renderer/; this keeps main's served bundle in sync. Auto-merged on green checks.")

          # --auto queues the merge to fire the moment required checks pass; if repo
          # auto-merge is unavailable the fallback poll-and-merge below still merges it.
          gh pr merge "$PR_URL" --merge --delete-branch --auto || {
            echo "auto-merge unavailable; polling for green checks then merging"
            for i in $(seq 1 40); do
              if gh pr checks "$PR_URL" | grep -qE '\bfail'; then
                echo "a required check failed"; exit 1
              fi
              if ! gh pr checks "$PR_URL" | grep -q pending; then
                gh pr merge "$PR_URL" --merge --delete-branch && exit 0
              fi
              sleep 20
            done
            echo "timed out waiting for checks"; exit 1
          }
