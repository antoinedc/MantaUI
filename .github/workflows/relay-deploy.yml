# Relay deploy — update + restart the relay on the prod box on a `relay-v*` tag.
#
# WHY THIS EXISTS
# ---------------
# The relay (node /opt/manta/src/relay/server.mjs, systemd `manta-relay` on the
# prod box) is deployed by `git -C /opt/manta pull && systemctl restart
# manta-relay`. Before this workflow that was a manual SSH command (part of
# scripts/release/publish.sh), so a merged relay fix could sit undeployed. This
# makes it a one-step action: push a `relay-v*` tag.
#
# SEPARATE FROM website-deploy ON PURPOSE: restarting the relay briefly drops
# live phone WebSocket connections (they reconnect), so it must NOT piggyback on
# a static website copy. Tag the relay only when relay/ or server code that the
# relay runs actually changed.
#
# HEALTH-GATED: after the restart it polls the relay's public endpoint; if the
# relay doesn't answer within the window, the workflow FAILS RED so a bad deploy
# is caught immediately instead of leaving the relay down silently.
#
# RUNNER + AUTH: self-hosted bui-dev-runner (this dev box), SSH to prod via
#   ~/.manta-deploy/prod_key. No GitHub secret needed.
#
# TRIGGER: push a tag matching relay-v* (e.g. relay-v1). Also workflow_dispatch.

name: Relay deploy

on:
  push:
    tags:
      - "relay-v*"
  workflow_dispatch:

concurrency:
  group: relay-deploy
  cancel-in-progress: false

env:
  PROD_HOST: root@91.107.196.2
  SSH_KEY: /home/dev/.manta-deploy/prod_key
  RELAY_URL: https://relay.mantaui.com

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Pull + restart the relay
        run: |
          set -euo pipefail
          SSH="ssh -i $SSH_KEY -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
          echo "▸ Pulling /opt/manta to origin/main"
          $SSH "$PROD_HOST" "git -C /opt/manta fetch origin main -q && git -C /opt/manta reset --hard origin/main -q && git -C /opt/manta log --oneline -1"
          echo "▸ Restarting manta-relay"
          $SSH "$PROD_HOST" "systemctl restart manta-relay && sleep 2 && systemctl is-active manta-relay"

      - name: Health-check the relay
        run: |
          set -euo pipefail
          # The relay answers /pair with a structured JSON error (fast) when
          # alive; a well-formed dummy pair returns 400/503 quickly. We treat ANY
          # HTTP response (2xx-5xx) as "relay is up"; only a connection failure /
          # timeout (000) means it didn't come back. Poll up to ~30s.
          ok=0
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              -X POST -H "content-type: application/json" \
              -d '{"box_id":"00000000000000000000000000000000","code":"000000"}' \
              "$RELAY_URL/pair" || echo 000)
            if [ "$code" != "000" ]; then
              echo "✓ relay responding (HTTP $code) after ${i} attempt(s)"
              ok=1
              break
            fi
            echo "… relay not up yet (attempt $i), retrying"
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Relay did not respond after restart — it may be down."
            exit 1
          fi
          echo "Relay deployed + healthy."
