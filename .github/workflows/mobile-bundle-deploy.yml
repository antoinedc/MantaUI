# Mobile bundle deploy — build the PWA bundle and publish it to the prod
# release host as a versioned tarball. NO git commit of build artifacts.
#
# WHY THIS EXISTS (replaces build-mobile-bundle.yml)
# --------------------------------------------------
# The mobile/web client (`src/server/` PUBLIC_DIR = mobile/www/) is served as a
# PRE-BUILT static bundle — the box reads the files off disk per request, there
# is no Vite build on the box. mobile/www/ is a build artifact of src/renderer/,
# so it must NOT live in git (Vite content-hashes filenames + rewrites the
# <script src> in index.html, which made every two in-flight PRs conflict — the
# old fix was to gitignore it on branches and rebuild-and-COMMIT it on main via
# an auto-merged PR). Committing generated bytes through a PR on every merge was
# wrong: PR churn, CI minutes, a no-op loop-guard run, and build artifacts in
# source history.
#
# THE MODEL (mirrors mac-v*/ios-v*/web-v* — artifacts, not commits)
# -----------------------------------------------------------------
# On every push to main this workflow builds mobile/www/ and publishes it to the
# prod webroot as:
#   releases/mobile-<gitsha>.tar.gz   (the bundle, tarred from repo root as mobile/www)
#   releases/mobile-latest.txt        (manifest: git sha + filename + sha256)
# The two consumers of the bundle fetch it instead of relying on a git commit:
#   * fresh install (scripts/install.sh) already builds its own bundle via
#     scripts/release/pack.mjs (`npm run build:mobile`) — UNAFFECTED.
#   * ongoing self-update (scripts/self-update.sh) now downloads + verifies +
#     extracts this tarball AFTER `git reset --hard origin/main`, so the served
#     bundle always matches main's source without being tracked in git.
#
# No auto-PR, no commit to main, no loop guard. `git pull` on the box no longer
# needs the bundle to be committed.
#
# RUNNER + AUTH
#   Runs on the self-hosted manta-dev-runner (this dev box), which reaches the
#   prod box over SSH with the deploy key at ~/.manta-deploy/prod_key (public
#   half is in the prod box's authorized_keys). Same as website-deploy.yml — no
#   GitHub secret needed.
#
# TRIGGER: push to main (the source of truth). Also runnable manually via
#   workflow_dispatch (rebuilds + republishes from current main).

name: Mobile bundle deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize: two merges to main in quick succession must not race two publishes
# of the bundle. cancel-in-progress:false so an in-flight build+publish finishes
# before the next runs (avoids a torn manifest/tarball pair on prod).
concurrency:
  group: mobile-bundle-deploy
  cancel-in-progress: false

env:
  PROD_HOST: root@91.107.196.2
  WEBROOT: /var/www/mantaui
  SSH_KEY: /home/dev/.manta-deploy/prod_key
  SITE: https://mantaui.com

jobs:
  build-and-publish:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty's electron-rebuild postinstall is best-effort (`|| true` in
      # package.json); the mobile build is pure Vite and doesn't need the native
      # module, so npm ci succeeds on the runner regardless.
      - run: npm ci

      - name: Build mobile bundle
        run: npm run build:mobile

      - name: Pack + publish bundle to prod
        run: |
          set -euo pipefail
          SSH="ssh -i $SSH_KEY -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
          SCP="scp -i $SSH_KEY -o BatchMode=yes -o StrictHostKeyChecking=accept-new"

          test -f mobile/www/index.html || { echo "::error::mobile/www/index.html missing after build"; exit 1; }

          SHA="${GITHUB_SHA::12}"
          TARBALL="mobile-${SHA}.tar.gz"

          echo "▸ Packing mobile/www → $TARBALL"
          # Tar from repo root so the archive contains the mobile/www/ prefix;
          # self-update extracts it over the checkout root and lands the files
          # back at mobile/www/.
          tar -czf "$TARBALL" mobile/www
          BUNDLE_SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)

          echo "▸ Writing manifest mobile-latest.txt"
          cat > mobile-latest.txt <<EOF
          git_sha=${GITHUB_SHA}
          file=${TARBALL}
          sha256=${BUNDLE_SHA256}
          EOF

          echo "▸ Ensuring releases dir exists on prod"
          $SSH "$PROD_HOST" "mkdir -p $WEBROOT/releases"

          echo "▸ Uploading tarball (immutable, sha-named)"
          $SCP "$TARBALL" "$PROD_HOST:$WEBROOT/releases/$TARBALL"

          # Upload the manifest LAST + atomically (temp + mv) so a reader never
          # sees a manifest pointing at a tarball that isn't fully uploaded yet.
          echo "▸ Uploading manifest atomically"
          $SCP mobile-latest.txt "$PROD_HOST:$WEBROOT/releases/mobile-latest.txt.tmp"
          $SSH "$PROD_HOST" "mv -f $WEBROOT/releases/mobile-latest.txt.tmp $WEBROOT/releases/mobile-latest.txt"

      - name: Verify published bundle is live + matches
        run: |
          set -euo pipefail
          echo "▸ Fetching live manifest"
          curl -fsSL "$SITE/releases/mobile-latest.txt" -o /tmp/live-mobile-latest.txt
          cat /tmp/live-mobile-latest.txt

          LIVE_GIT_SHA=$(grep '^git_sha=' /tmp/live-mobile-latest.txt | cut -d= -f2)
          LIVE_FILE=$(grep '^file=' /tmp/live-mobile-latest.txt | cut -d= -f2)
          LIVE_SHA256=$(grep '^sha256=' /tmp/live-mobile-latest.txt | cut -d= -f2)

          if [ "$LIVE_GIT_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::live manifest git_sha=$LIVE_GIT_SHA != this run's $GITHUB_SHA"
            exit 1
          fi

          echo "▸ Downloading live tarball + verifying sha256"
          curl -fsSL "$SITE/releases/$LIVE_FILE" -o /tmp/live-bundle.tar.gz
          GOT=$(sha256sum /tmp/live-bundle.tar.gz | cut -d' ' -f1)
          if [ "$GOT" != "$LIVE_SHA256" ]; then
            echo "::error::live tarball sha256=$GOT != manifest $LIVE_SHA256"
            exit 1
          fi
          echo "✓ mobile bundle published + verified (git_sha=$GITHUB_SHA, file=$LIVE_FILE)."
