<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0e0f12" />
    <title>bui</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      :root {
        --bg: #0e0f12;
        --bg-elev: #15171c;
        --fg: #e6e6e6;
        --fg-dim: #8a8f98;
        --accent: #66c0f4;
        --border: #2a2d34;
        --danger: #e57373;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 15px; overscroll-behavior: none; }
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      button { background: var(--bg-elev); color: var(--fg); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px 14px; font: inherit; touch-action: manipulation; }
      button:active { background: #1f2228; }

      /* ---- list view ---- */
      .list-view { padding: 12px; }
      .list-header { display: flex; align-items: center; justify-content: space-between;
        padding: 4px 4px 12px; }
      .list-header h1 { margin: 0; font-size: 18px; font-weight: 600; }
      .session { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
        margin-bottom: 12px; overflow: hidden; }
      .session-name { padding: 12px 14px; font-weight: 600; display: flex; align-items: center;
        gap: 8px; border-bottom: 1px solid var(--border); }
      .session-name .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); }
      .session-name.attached .dot { background: #5fd07f; }
      .window { display: flex; align-items: center; justify-content: space-between;
        padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
      .window:last-child { border-bottom: none; }
      .window:active { background: #1f2228; }
      .window-name { font-weight: 500; }
      .window-path { font-size: 12px; color: var(--fg-dim); margin-top: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; }
      .window-meta { color: var(--fg-dim); font-size: 12px; }
      .empty { color: var(--fg-dim); text-align: center; padding: 32px 16px; }
      .error { color: var(--danger); padding: 12px 14px; }

      /* ---- terminal view ---- */
      .term-view { display: none; flex-direction: column; height: 100vh;
        height: 100dvh; /* iOS Safari, accounts for dynamic toolbar */ }
      .term-view.active { display: flex; }
      .term-bar { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
        background: var(--bg-elev); border-bottom: 1px solid var(--border); }
      .term-bar .title { flex: 1; font-size: 14px; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .term-bar button { padding: 6px 10px; font-size: 13px; }
      .term-host { flex: 1; min-height: 0; background: #000; padding: 4px; }
      .term-host .xterm { height: 100% !important; }
      .term-keys { display: flex; gap: 4px; padding: 6px; overflow-x: auto;
        background: var(--bg-elev); border-top: 1px solid var(--border); }
      .term-keys button { padding: 8px 10px; font-size: 13px; min-width: 44px; flex-shrink: 0; }
      .term-keys button.armed { background: var(--accent); color: #000; border-color: var(--accent); }
      .upload-status { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
        background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg);
        padding: 8px 14px; border-radius: 8px; font-size: 13px; max-width: 86vw;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 10; }
      .upload-status.err { border-color: var(--danger); color: var(--danger); }

      /* ---- settings view ---- */
      .settings-view { display: none; min-height: 100dvh; align-items: center;
        justify-content: center; padding: 24px; }
      .settings-view.active { display: flex; }
      .settings-card { width: 100%; max-width: 420px; background: var(--bg-elev);
        border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
      .settings-card h1 { margin: 0 0 4px; font-size: 22px; }
      .settings-sub { margin: 0 0 16px; color: var(--fg-dim); font-size: 14px; }
      .settings-card input { width: 100%; background: var(--bg); color: var(--fg);
        border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
        font: inherit; margin-bottom: 12px; }
      .settings-card input:focus { outline: none; border-color: var(--accent); }
      .settings-card button { width: 100%; background: var(--accent); color: #000;
        border-color: var(--accent); font-weight: 600; }
      .settings-err { color: var(--danger); font-size: 13px; margin: -4px 0 12px; }
      .list-header-actions { display: flex; gap: 8px; }
      .list-view.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="settings" class="settings-view">
      <div class="settings-card">
        <h1>bui</h1>
        <p class="settings-sub">Enter the address of your bui server.</p>
        <input
          id="server-url"
          type="url"
          inputmode="url"
          autocomplete="url"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="http://myserver:8787"
        />
        <div id="server-err" class="settings-err" hidden></div>
        <button id="server-save">Connect</button>
      </div>
    </div>

    <div id="list" class="list-view">
      <div class="list-header">
        <h1>bui</h1>
        <div class="list-header-actions">
          <button id="settings-open" aria-label="Server settings">&#9881;</button>
          <button id="refresh" aria-label="Refresh">&#8635;</button>
        </div>
      </div>
      <div id="sessions"></div>
    </div>

    <div id="term" class="term-view">
      <div class="term-bar">
        <button id="back" aria-label="Back">&#8592;</button>
        <div class="title" id="term-title"></div>
        <button id="upload-btn" aria-label="Upload file">&#128206;</button>
        <button id="disconnect" aria-label="Disconnect">&times;</button>
      </div>
      <div class="term-host" id="term-host"></div>
      <div class="term-keys">
        <button data-key="esc">Esc</button>
        <button data-key="tab">Tab</button>
        <button id="ctrl-toggle" data-key="ctrl">Ctrl</button>
        <button data-key="up">&#8593;</button>
        <button data-key="down">&#8595;</button>
        <button data-key="left">&#8592;</button>
        <button data-key="right">&#8594;</button>
        <button data-key="enter">&#9166;</button>
        <input type="file" id="upload-input" multiple style="display:none" />
      </div>
      <div id="upload-status" class="upload-status" hidden></div>
    </div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/static/app.js?v=2"></script>
  </body>
</html>
