# Codemagic CI/CD — build the Capacitor iOS app and publish to TestFlight.
#
# WHY CODEMAGIC (not Xcode Cloud):
#   Xcode Cloud built + signed fine but could NEVER authenticate to upload the
#   binary to App Store Connect ("Session Proxy Provider Code=1" — a known
#   Xcode Cloud auth bug). Codemagic uploads via the App Store Connect API key,
#   which authenticates reliably. Codemagic also has first-class Capacitor
#   support and automatic code signing driven by that same API key.
#
# ONE-TIME SETUP IN THE CODEMAGIC WEB UI (you do this once):
#   1. Sign up at codemagic.io, connect the GitHub repo antoinedc/MantaUI.
#   2. Team → Integrations → Developer Portal → add an App Store Connect API key:
#        - Key ID, Issuer ID, and the .p8 file (the same ASC key already in the
#          bui Secrets card). Name the integration "codemagic" (referenced below
#          as app_store_connect: codemagic).
#   3. That's it — this file drives everything else.
#
# TRIGGER: a git tag matching ios-v* (matches the auto-tag workflow the box
#   already pushes). Also runnable manually from the Codemagic UI.

workflows:
  ios-testflight:
    name: MantaUI iOS → TestFlight
    instance_type: mac_mini_m2      # 500 free M2 minutes/month
    max_build_duration: 60
    integrations:
      app_store_connect: APS Key  # MUST match the ASC API key integration name in the Codemagic UI exactly (Team > Integrations > Developer Portal)
    environment:
      # NOTE: no declarative `ios_signing:` block on purpose. That block makes
      # Codemagic resolve signing at environment-setup time (before scripts run)
      # and fails with "No matching profiles found" if the profile doesn't
      # already exist. Instead the "Set up code signing" script below runs
      # `app-store-connect fetch-signing-files --create`, which CREATES the
      # distribution cert + App Store profile via the ASC API key if missing.
      vars:
        BUNDLE_ID: "com.antoinedc.mantaui"
        APP_STORE_APPLE_ID: 6792363427
        XCODE_WORKSPACE: "mobile/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    scripts:
      - name: Build web bundle (renderer → mobile/www)
        script: |
          npm ci
          npm run build:mobile
      - name: Install mobile deps + Capacitor sync
        script: |
          cd mobile
          npm ci
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Set up code signing (App Store profile via ASC API key)
        script: |
          # THE PRIVATE-KEY REQUIREMENT: a distribution certificate is only
          # usable for signing by whoever holds its PRIVATE KEY. Earlier failures
          # ("Cannot save Signing Certificates without certificate private key")
          # happened because no private key existed on the build machine. So:
          # generate a private key HERE, create a NEW cert FROM it, and use that
          # key for every subsequent step.
          keychain initialize

          # 1. Generate a fresh RSA private key on the build machine.
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/dist_key -q -N ""

          # 2. Create a distribution certificate FROM that key via the ASC API
          #    key. --save stores the resulting cert next to the key so
          #    fetch/keychain steps can find both. Ignore failure if a cert of
          #    this type already exists (max 2 distribution certs per account).
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/dist_key \
            --save || \
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/dist_key \
            --save

          # 3. Fetch signing files, passing the SAME private key so Codemagic can
          #    match the cert to its key and build a usable p12 + create the
          #    App Store provisioning profile for the bundle id.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_key \
            --create

          # 4. Import the certificate(s) into the keychain.
          keychain add-certificates

          # 5. Write the profile's specifier into the Xcode project + the export
          #    options plist that build-ipa consumes.
          xcode-project use-profiles \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"
      - name: Build + archive .ipa
        script: |
          # use-profiles (previous step) set the project to manual signing with
          # the fetched App Store profile and wrote the export options plist to
          # $CM_BUILD_DIR/export_options.plist. Feed it so the archive + export
          # have a concrete profile (fixes "App requires a provisioning
          # profile"). Force the team so manual signing resolves.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "DEVELOPMENT_TEAM=FSQ3HS4Z24" \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration          # use the ASC API key integration
        submit_to_testflight: true
        # Internal testers get it automatically once processing completes.
        # No App Store review needed for internal TestFlight.

  # ---------------------------------------------------------------------------
  # macOS desktop (Electron) → signed + notarized DMG → mantaui.com
  # ---------------------------------------------------------------------------
  # Distributes the desktop app OUTSIDE the App Store (beta). electron-builder
  # signs with a "Developer ID Application" cert and notarizes via the ASC API
  # key, then the DMG + latest-mac.yml auto-update feed are published to the
  # prod box (mantaui.com/downloads + /updates).
  #
  # ONE-TIME SETUP IN THE CODEMAGIC WEB UI (see docs/mac-beta-distribution.md):
  #   1. Create a "Developer ID Application" cert on a Mac (Xcode → Settings →
  #      Accounts → Manage Certificates → + → Developer ID Application), export
  #      it as a .p12 with a password.
  #   2. Codemagic UI → this app → Environment variables, group "mac_signing":
  #        - CSC_LINK               = the .p12, base64-encoded, marked "secure"
  #                                   (base64 -i cert.p12 | pbcopy)
  #        - CSC_KEY_PASSWORD       = the .p12 password, "secure"
  #        - APPLE_ID               = your Apple ID email, "secure"
  #        - APPLE_APP_SPECIFIC_PASSWORD = app-specific pw (appleid.apple.com), "secure"
  #        - APPLE_TEAM_ID          = FSQ3HS4Z24
  #   3. For publishing to the prod box, group "prod_deploy":
  #        - PROD_SSH_KEY           = a base64 private key with access to
  #                                   root@91.107.196.2, "secure"
  #      (Or skip publishing and download the DMG from Codemagic artifacts.)
  #
  # TRIGGER: git tag matching mac-v* (kept separate from ios-v* so an iOS tag
  #   doesn't fire a mac build and vice-versa). Also runnable from the UI.
  mac-desktop:
    name: MantaUI macOS → DMG (Developer ID, notarized)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: APS Key
    environment:
      groups:
        # All mac signing + deploy vars live in one Codemagic UI group named
        # "mantaui": CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
        # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, and (optional) PROD_SSH_KEY.
        - mantaui
      node: 22
      xcode: latest
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "mac-v*"
          include: true
    scripts:
      - name: Provide distutils for node-gyp (Python 3.12+)
        script: |
          # electron-builder rebuilds the native node-pty module via node-gyp,
          # which imports Python's `distutils`. Python 3.12 (the Codemagic M2
          # default) REMOVED distutils from the stdlib, so the rebuild fails with
          # "ModuleNotFoundError: No module named 'distutils'". `setuptools`
          # re-provides a distutils shim. Install it into the runner's python3.
          python3 -m pip install --upgrade "setuptools<81" || pip3 install "setuptools<81"
      - name: Install deps
        script: |
          npm ci
      - name: Import Developer ID cert into a Codemagic keychain
        script: |
          # THE HANG FIX: letting electron-builder import the .p12 into its own
          # temp keychain made `codesign` BLOCK forever waiting for a GUI
          # keychain-unlock prompt that never comes on CI (the build stalled
          # right after "signing … Manta UI.app", never reaching notarization).
          # Instead use Codemagic's `keychain` CLI, which initializes an UNLOCKED
          # keychain and sets the key partition list so codesign runs
          # non-interactively — same mechanism the iOS workflow uses.
          set -e
          keychain initialize
          P12="$CM_BUILD_DIR/dist_cert.p12"
          echo "$CSC_LINK" | base64 --decode > "$P12"
          keychain add-certificates \
            --certificate "$P12" \
            --certificate-password "$CSC_KEY_PASSWORD"
          # electron-builder must NOT re-import into its own keychain now — unset
          # CSC_LINK/CSC_KEY_PASSWORD so it discovers the "Developer ID
          # Application" identity from the keychain we just prepared (mac.identity
          # in electron-builder.yml selects it).
          echo "CSC_LINK=" >> "$CM_ENV"
          echo "CSC_KEY_PASSWORD=" >> "$CM_ENV"
          # Belt-and-braces: never let electron-builder fall back to interactive
          # keychain access.
          echo "CSC_KEYCHAIN=$(security default-keychain -d user | tr -d ' \"')" >> "$CM_ENV" || true
      - name: Build + sign + notarize DMG
        script: |
          # electron-vite build → electron-builder --mac. electron-builder:
          #   - signs with the Developer ID identity from the keychain prepared
          #     above (mac.identity: "Developer ID Application")
          #   - notarizes via APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID
          #     (notarize: true in electron-builder.yml)
          #   - staples the ticket into the .dmg
          # --publish never: emit latest-mac.yml but don't use electron-builder's
          # own uploader (we scp to the prod box in the next step).
          # CSC_IDENTITY_AUTO_DISCOVERY=true lets it find the keychain identity.
          set -e
          export CSC_IDENTITY_AUTO_DISCOVERY=true
          npm run build
          npx electron-builder --mac --publish never
      - name: Verify notarization
        script: |
          set -e
          for dmg in dist/desktop/*.dmg; do
            echo "▸ $dmg"
            spctl -a -vvv -t install "$dmg" 2>&1 | grep -i "notarized\|accepted" || true
            xcrun stapler validate "$dmg" || echo "⚠ stapler validate failed for $dmg"
          done
      - name: Publish to mantaui.com (optional)
        script: |
          # Skips cleanly if no deploy key is configured, so the workflow still
          # produces downloadable Codemagic artifacts without prod access.
          if [ -z "${PROD_SSH_KEY:-}" ]; then
            echo "No PROD_SSH_KEY — skipping publish. DMG is in Codemagic artifacts."
            exit 0
          fi
          set -e
          mkdir -p ~/.ssh
          echo "$PROD_SSH_KEY" | base64 --decode > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          SSH="ssh -i ~/.ssh/prod_key -o StrictHostKeyChecking=accept-new"
          HOST="root@91.107.196.2"
          $SSH "$HOST" 'mkdir -p /var/www/mantaui/updates /var/www/mantaui/downloads'
          # Upload feed + binaries to the update channel.
          scp -i ~/.ssh/prod_key dist/desktop/latest-mac.yml "$HOST:/var/www/mantaui/updates/"
          scp -i ~/.ssh/prod_key dist/desktop/*.dmg "$HOST:/var/www/mantaui/updates/"
          # Human-facing downloads + refresh the canonical Manta-latest.dmg
          # (arm64 preferred; falls back to whatever single dmg exists).
          scp -i ~/.ssh/prod_key dist/desktop/*.dmg "$HOST:/var/www/mantaui/downloads/"
          $SSH "$HOST" 'cd /var/www/mantaui/downloads && \
            latest=$(ls -1 *arm64*.dmg 2>/dev/null | head -1); \
            [ -z "$latest" ] && latest=$(ls -1 *.dmg | sort -V | tail -1); \
            cp -f "$latest" Manta-latest.dmg && echo "Manta-latest.dmg -> $latest"'
    artifacts:
      - dist/desktop/*.dmg
      - dist/desktop/latest-mac.yml
