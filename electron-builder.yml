# electron-builder config for Manta UI desktop app.
#
# Builds:
#   - macOS: .dmg (Developer ID-signed; notarization OFF for beta — see mac.notarize)
#   - Linux: .AppImage
#
# Auto-update: configured via electron-updater in src/main/autoUpdate.ts.
# Update server: the prod box apex — `https://mantaui.com/updates/` (electron-
# updater "generic" provider). Upload the whole `dist/desktop/` output
# (binaries + latest-{mac,linux}.yml) to that path and electron-updater does
# the rest.
#
# Signing identities are read from environment variables:
#   - CSC_LINK: path to .p12 certificate file (macOS code signing)
#   - CSC_KEY_PASSWORD: password for the .p12 certificate
#   - APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD: for notarization (optional)
#
# These are NOT committed to the repo — set them in CI or locally.

appId: com.antoinedc.mantaui
productName: Manta UI

directories:
  output: dist/desktop

files:
  - "out/**/*"
  - "package.json"

extraMetadata:
  main: out/main/index.js

# Custom URL scheme for OS-level deep-link pairing (BET-240). electron-builder
# generates `CFBundleURLTypes` on macOS and the `MimeType=x-scheme-handler/manta`
# entry on Linux `.desktop` files from this block — do NOT hand-edit any plist.
# iOS already handles `manta://` via mobile/ios/.../Info.plist (BET-156).
protocols:
  - name: MantaUI Pairing
    schemes:
      - manta

mac:
  icon: "assets/icon.icns"
  category: "public.app-category.developer-tools"
  target:
    - target: dmg
      arch:
        # arm64 only — halves pack + notarization time/cost. Nearly all Mac
        # testers are Apple Silicon; re-add `- x64` here if an Intel tester
        # needs it (Rosetta can't run an arm64 build).
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: "assets/entitlements.mac.plist"
  entitlementsInherit: "assets/entitlements.mac.plist"
  darkModeSupport: true
  artifactName: "${productName}-${version}-${arch}.dmg"
  # Distribution OUTSIDE the App Store: sign with a "Developer ID Application"
  # certificate. electron-builder auto-selects it from the login keychain when
  # present (or set CSC_LINK/CSC_KEY_PASSWORD to a .p12). Explicit so an App
  # Store cert in the keychain isn't picked by mistake.
  identity: "Developer ID Application"
  # NOTARIZATION ENABLED. electron-builder notarizes + staples the .app inside
  # the bundle via @electron/notarize, authenticating with an App Store Connect
  # API KEY (not an Apple-ID app-specific password): the codemagic mac-desktop
  # workflow exports APPLE_API_KEY (path to the .p8) / APPLE_API_KEY_ID /
  # APPLE_API_ISSUER / APPLE_TEAM_ID before running electron-builder. NOTE: this
  # only covers the .app — the OUTER .dmg is separately signed, notarized and
  # stapled by the workflow's "Sign + notarize + staple the DMG itself" step,
  # because an unsigned/un-notarized DMG fails Gatekeeper on download
  # ("source=no usable signature") even when the app inside is notarized.
  #
  # Building WITHOUT the ASC key present (e.g. a bare local `electron-builder
  # --mac` with no creds) will fail the notarize step. For a signed-only local
  # build, override on the CLI: `electron-builder --mac -c.mac.notarize=false`,
  # or use the macos-desktop-notarize plugin with notarize=false.
  notarize: true

linux:
  icon: "assets/icons"
  category: "Development"
  target:
    - target: AppImage
      arch:
        - x64
  executableName: manta-ui
  artifactName: "${productName}-${version}-${arch}.AppImage"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# Auto-update configuration (electron-updater)
# Uses the prod box apex as the update server. The `publish` field tells
# electron-builder to (a) generate `latest-mac.yml` / `latest-linux.yml`
# next to the artifacts and (b) upload when `--publish always` is set.
# scripts/release/desktop.sh builds with `--publish never` (so the yml is
# emitted but NOT uploaded); the owner scp's the whole `dist/desktop/`
# directory to `<prod>:/var/www/mantaui/updates/` (see the script's printed
# checklist).
publish:
  provider: generic
  url: https://mantaui.com/updates

# (Target selection is on the CLI — `scripts/release/desktop.sh` passes
# `--mac --linux` so we never build the `win:` target above. There used to
# be an `only:` block here, but `only` is a CLI-only flag in electron-builder
# 25.x and the config schema rejects it.)
